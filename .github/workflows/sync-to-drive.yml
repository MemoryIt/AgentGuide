name: 测试同步到 Google Drive

on:
  workflow_dispatch:        # 允许手动触发（测试用）
  push:
    branches: [ main ]      # 或者你 fork 仓库默认分支的名字

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: 同步到 Google Drive
        run: |
          rclone sync . "gdrive:GitHub-Backup/${{ github.repository }}" \
            --exclude ".git/**" \
            --exclude ".github/workflows/**" \
            --delete-excluded \
            --progress \
            --verbose
        env:
          RCLONE_LOG_LEVEL: INFO
